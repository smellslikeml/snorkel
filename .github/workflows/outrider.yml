name: Outrider

# Manually triggered. Uncomment the schedule block below to enable a
# weekly cron.
#
# Secrets needed (set as repo secrets):
#   REMYX_API_KEY     — engine.remyx.ai token
#   ANTHROPIC_API_KEY — model-provider token

on:
  # schedule:
  #   - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Mint Remyx bot token
        id: remyx-bot
        shell: bash
        run: |
          token="$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.REMYX_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"repo\": \"${{ github.repository }}\"}" \
            "https://engine.remyx.ai/api/v1.0/github/installation-token" \
            | python3 -c "import sys, json; print(json.load(sys.stdin).get('token', ''))")" || token=""
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
      - uses: remyxai/outrider@v1
        with:
          interest-id: 970cf94c-18fa-4086-93ec-d038fea864c8
          github-token: ${{ steps.remyx-bot.outputs.token }}
          # Disable cadence guard so manual dispatches always evaluate latest recommendation.
          rate-limit-days: '0'
